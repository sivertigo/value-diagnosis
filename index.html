<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価値観診断 — あなたの意思決定の軸を知る</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080d;
      --card: #0f0f18;
      --card2: #14141f;
      --border: #1e1e2e;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --accent: #7c6dfa;
      --accent2: #a78bfa;
      --danger: #f87171;
      --成長: #f97316;
      --金: #eab308;
      --時間: #22d3ee;
      --安定: #34d399;
      --自由: #a3e635;
      --影響力: #fb7185;
      --承認: #c084fc;
      --好き: #f472b6;
      --意義: #60a5fa;
      --所属: #fbbf24;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ── START SCREEN ── */
    #screen-start {
      padding: 48px 24px;
      text-align: center;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, #1a0a3d 0%, transparent 70%);
    }

    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 99px;
      border: 1px solid #2e2e50;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
      letter-spacing: .06em;
    }

    h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    h1 span {
      background: linear-gradient(135deg, #7c6dfa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      max-width: 420px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .axes-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 480px;
      margin: 0 auto 40px;
    }

    .axis-chip {
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid currentColor;
      opacity: .75;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c6dfa, #a78bfa);
      color: #fff;
      border: none;
      padding: 16px 48px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 40px rgba(124, 109, 250, .35);
      letter-spacing: .02em;
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(124,109,250,.5); }
    .btn-primary:active { transform: translateY(0); }

    .meta {
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── QUIZ SCREEN ── */
    #screen-quiz {
      padding: 32px 24px;
      justify-content: flex-start;
    }

    .quiz-header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 32px;
    }

    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c6dfa, #a78bfa);
      border-radius: 99px;
      transition: width .4s ease;
    }

    .progress-text {
      font-size: 13px;
      color: var(--muted);
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 20px;
    }

    .q-category {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 12px;
    }

    .q-text {
      font-size: clamp(16px, 3vw, 20px);
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 28px;
      color: var(--text);
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: var(--accent);
      background: rgba(124,109,250,.08);
      transform: translateY(-1px);
    }

    .option-btn.selected {
      border-color: var(--accent2);
      background: rgba(167,139,250,.12);
    }

    .option-btn.selected.strong {
      border-color: var(--accent);
      background: rgba(124,109,250,.18);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .option-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .option-desc {
      font-weight: 600;
    }

    .option-axis {
      margin-top: 8px;
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid currentColor;
      opacity: .6;
    }

    /* intensity selector */
    .intensity-wrap {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      align-items: center;
    }

    .intensity-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .intensity-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--card2);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }

    .intensity-btn:hover { border-color: var(--accent); color: var(--text); }
    .intensity-btn.active {
      border-color: var(--accent2);
      background: rgba(167,139,250,.15);
      color: var(--text);
      font-weight: 600;
    }

    .nav-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 680px;
      justify-content: flex-end;
    }

    .btn-next {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      opacity: .4;
      pointer-events: none;
    }

    .btn-next.enabled {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-next.enabled:hover { background: var(--accent2); transform: translateY(-1px); }

    .btn-back {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--muted);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-back:hover { border-color: var(--accent); color: var(--text); }

    /* ── RESULT SCREEN ── */
    #screen-result {
      padding: 48px 24px;
      justify-content: flex-start;
      align-items: center;
    }

    .result-inner {
      width: 100%;
      max-width: 760px;
    }

    .result-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .type-badge {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #7c6dfa22, #a78bfa22);
      border: 1px solid var(--accent2);
      color: var(--accent2);
    }

    .type-name {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 900;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #7c6dfa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .type-tagline {
      font-size: 16px;
      color: var(--muted);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .result-grid { grid-template-columns: 1fr; }
      .options-grid { grid-template-columns: 1fr; }
      .intensity-wrap { flex-wrap: wrap; }
    }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .result-card.full { grid-column: 1 / -1; }

    .card-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .chart-wrap {
      position: relative;
      height: 280px;
    }

    /* top values */
    .value-list { display: flex; flex-direction: column; gap: 10px; }

    .value-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .value-name {
      font-size: 13px;
      font-weight: 700;
      width: 52px;
      flex-shrink: 0;
    }

    .value-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .value-bar {
      height: 100%;
      border-radius: 99px;
      transition: width .6s ease;
    }

    .value-pct {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* risks */
    .risk-list { display: flex; flex-direction: column; gap: 10px; }

    .risk-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: 10px;
      background: var(--card2);
      border: 1px solid var(--border);
    }

    .risk-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

    .risk-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .risk-text strong { color: var(--text); }

    /* env */
    .env-list { display: flex; flex-direction: column; gap: 8px; }

    .env-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .env-dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    /* contradiction */
    .contradiction-card {
      background: rgba(248,113,113,.06);
      border: 1px solid rgba(248,113,113,.25);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .contradiction-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .contradiction-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .contradiction-text strong { color: var(--text); }

    /* retry */
    .result-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .btn-retry {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--muted);
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all .15s;
      font-weight: 600;
    }

    .btn-retry:hover { border-color: var(--accent); color: var(--text); }

    /* loading */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 60px auto;
    }

    /* fade in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fadeUp { animation: fadeUp .4s ease forwards; }

    .q-transition {
      animation: fadeUp .3s ease forwards;
    }
  </style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div id="screen-start" class="screen active">
  <div class="badge">TRADEOFF-BASED VALUES DIAGNOSIS</div>
  <h1>あなたは<br>何を最大化して<br><span>生きているか。</span></h1>
  <p class="subtitle">
    性格ではなく、意思決定のパターンを分析する。<br>
    15問のトレードオフ選択で、あなたの価値観を可視化します。
  </p>
  <div class="axes-preview" id="axes-preview"></div>
  <button class="btn-primary" onclick="startQuiz()">診断をはじめる</button>
  <p class="meta">所要時間：約3分 ／ 全15問</p>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">1 / 15</div>
  </div>

  <div class="question-card q-transition" id="question-card">
    <!-- injected by JS -->
  </div>

  <div class="nav-row">
    <button class="btn-back" id="btn-back" onclick="prevQuestion()" style="display:none">← 戻る</button>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">次へ →</button>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="screen-result" class="screen">
  <div class="result-inner" id="result-inner">
    <div class="loading"></div>
  </div>
</div>

<script>

// DATA
// ===========================

  {

  {

  {

  {

    optionB: { desc: '組織に属して\n安定した収入と生活', axis: '安定' },
  },
];

// Type definitions: primary axis → type
const TYPES = {
  '成長': {
    secondary: {
      '自由':  { name: '成長×自律型', tagline: '自分のペースで、誰よりも深く成長し続ける。あなたにとって「進化」そのものが目的です。' },

      { icon: '🔥', title: 'バーンアウト', text: '成長に執着しすぎると、常に「足りない」感覚に苦しむことがあります。' },
      { icon: '🔗', title: '関係の軽視', text: 'スピードを求めるあまり、人間関係や安定した繋がりを後回しにしがちです。' },

    envs: [

  },

// STATE
// ===========================
let currentQ = 0;
let answers = []; // { questionId, chosenAxis, intensity } intensity: 1 or 2

// ===========================
// INIT
// ===========================
function init() {
  // Render axis chips
  const wrap = document.getElementById('axes-preview');
  AXES.forEach(axis => {
    const chip = document.createElement('span');
    chip.className = 'axis-chip';
    chip.textContent = axis;
    chip.style.color = AXIS_COLORS[axis];
    chip.style.borderColor = AXIS_COLORS[axis];
    wrap.appendChild(chip);
  });
}

// ===========================
// QUIZ
// ===========================
function startQuiz() {
  currentQ = 0;
  answers = [];
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const card = document.getElementById('question-card');
  const pct = ((currentQ) / QUESTIONS.length * 100).toFixed(0);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('btn-back').style.display = currentQ > 0 ? 'block' : 'none';
  document.getElementById('btn-next').classList.remove('enabled');

  const existing = answers[currentQ];

  card.classList.remove('q-transition');
  void card.offsetWidth;
  card.classList.add('q-transition');

  card.innerHTML = `
    <div class="q-category">${q.category}</div>
    <div class="q-text">${q.text}</div>
    <div class="options-grid">
      <button class="option-btn" id="opt-a" onclick="selectOption('A')">
        <div class="option-label">A</div>
        <div class="option-desc">${q.optionA.desc.replace('\n','<br>')}</div>
        <span class="option-axis" style="color:${AXIS_COLORS[q.optionA.axis]};border-color:${AXIS_COLORS[q.optionA.axis]}">${q.optionA.axis}</span>
      </button>
      <button class="option-btn" id="opt-b" onclick="selectOption('B')">
        <div class="option-label">B</div>
        <div class="option-desc">${q.optionB.desc.replace('\n','<br>')}</div>
        <span class="option-axis" style="color:${AXIS_COLORS[q.optionB.axis]};border-color:${AXIS_COLORS[q.optionB.axis]}">${q.optionB.axis}</span>
      </button>
    </div>
    <div class="intensity-wrap" id="intensity-wrap" style="display:none">
      <span class="intensity-label">確信度：</span>
      <button class="intensity-btn" id="int-2" onclick="selectIntensity(2)">強くそう思う</button>
      <button class="intensity-btn" id="int-1" onclick="selectIntensity(1)">どちらかといえば</button>
    </div>
  `;

  // Restore previous answer if exists
  if (existing) {
    document.getElementById('opt-' + existing.option.toLowerCase()).classList.add('selected', existing.intensity === 2 ? 'strong' : '');
    document.getElementById('intensity-wrap').style.display = 'flex';
    document.getElementById('int-' + existing.intensity).classList.add('active');
    document.getElementById('btn-next').classList.add('enabled');
  }
}

let selectedOption = null;
let selectedIntensity = null;

function selectOption(opt) {
  selectedOption = opt;
  selectedIntensity = null;

  document.getElementById('opt-a').classList.remove('selected', 'strong');
  document.getElementById('opt-b').classList.remove('selected', 'strong');
  document.getElementById('opt-' + opt.toLowerCase()).classList.add('selected');

  const intensityWrap = document.getElementById('intensity-wrap');
  intensityWrap.style.display = 'flex';
  document.getElementById('int-1').classList.remove('active');
  document.getElementById('int-2').classList.remove('active');

  document.getElementById('btn-next').classList.remove('enabled');
}

function selectIntensity(val) {
  selectedIntensity = val;
  document.getElementById('int-1').classList.remove('active');
  document.getElementById('int-2').classList.remove('active');
  document.getElementById('int-' + val).classList.add('active');

  // Update button visual
  const btn = document.getElementById('opt-' + selectedOption.toLowerCase());
  btn.classList.remove('strong');
  if (val === 2) btn.classList.add('strong');

  document.getElementById('btn-next').classList.add('enabled');

  // Auto-save
  const q = QUESTIONS[currentQ];
  const axis = selectedOption === 'A' ? q.optionA.axis : q.optionB.axis;
  answers[currentQ] = { questionId: q.id, option: selectedOption, chosenAxis: axis, intensity: val };
}

function nextQuestion() {
  if (!answers[currentQ]) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    selectedOption = null;
    selectedIntensity = null;
    renderQuestion();
  } else {
    computeResults();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    const prev = answers[currentQ];
    if (prev) {
      selectedOption = prev.option;
      selectedIntensity = prev.intensity;
    } else {
      selectedOption = null;
      selectedIntensity = null;
    }
    renderQuestion();
  }
}

// ===========================
// SCORING & RESULTS
// ===========================
function computeResults() {
  showScreen('result');

  // Score
  const scores = {};
  AXES.forEach(a => scores[a] = 0);
  answers.forEach(ans => {
    if (ans) scores[ans.chosenAxis] += ans.intensity;
  });

  // Normalize
  const total = Object.values(scores).reduce((a,b)=>a+b, 0);
  const normalized = {};
  AXES.forEach(a => normalized[a] = total > 0 ? scores[a] / total : 0);

  // Sorted axes
  const sorted = [...AXES].sort((a,b) => normalized[b] - normalized[a]);
  const primaryAxis = sorted[0];
  const secondaryAxis = sorted[1];

  // Type
  const typeData = TYPES[primaryAxis];
  const typeInfo = typeData.secondary[secondaryAxis] || typeData.default;

  // Contradictions
  const contradictions = CONTRADICTIONS.filter(c => {
    return normalized[c.axes[0]] > c.threshold && normalized[c.axes[1]] > c.threshold;
  });

  // Render
  setTimeout(() => renderResults(normalized, sorted, typeInfo, typeData, contradictions), 300);
}

function renderResults(normalized, sorted, typeInfo, typeData, contradictions) {
  const el = document.getElementById('result-inner');

  // Contradiction block
  const contraHtml = contradictions.length > 0 ? `
    <div class="contradiction-card fadeUp">
      <div class="contradiction-title">⚠️ 矛盾シグナル検出</div>
      <div class="contradiction-text">
        ${contradictions.map(c => `<p style="margin-bottom:8px">• ${c.message}</p>`).join('')}
      </div>
    </div>
  ` : '';

  // Value bars (top 10)
  const valueBars = AXES.map(axis => {
    const pct = (normalized[axis] * 100).toFixed(0);
    return `
      <div class="value-row">
        <span class="value-name" style="color:${AXIS_COLORS[axis]}">${axis}</span>
        <div class="value-bar-bg">
          <div class="value-bar" style="width:0%;background:${AXIS_COLORS[axis]}" data-target="${pct}"></div>
        </div>
        <span class="value-pct">${pct}%</span>
      </div>
    `;
  }).join('');

  // Risks
  const risksHtml = typeData.risks.map(r => `
    <div class="risk-item">
      <span class="risk-icon">${r.icon}</span>
      <div class="risk-text"><strong>${r.title}</strong><br>${r.text}</div>
    </div>
  `).join('');

  // Envs
  const matchColor = { high: '#34d399', mid: '#fbbf24' };
  const envsHtml = typeData.envs.map(e => `
    <div class="env-item">
      <div class="env-dot" style="background:${matchColor[e.match]}"></div>
      <span>${e.text}</span>
      <span style="margin-left:auto;font-size:12px;color:${matchColor[e.match]};font-weight:700">${e.match === 'high' ? '◎ 適合' : '○ 可能性'}</span>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="result-header fadeUp">
      <div class="type-badge">あなたの価値観タイプ</div>
      <div class="type-name">${typeInfo.name}</div>
      <div class="type-tagline">${typeInfo.tagline}</div>
    </div>

    ${contraHtml}

    <div class="result-grid">
      <div class="result-card full">
        <div class="card-title">価値観レーダー</div>
        <div class="chart-wrap">
          <canvas id="radar-chart"></canvas>
        </div>
      </div>

      <div class="result-card">
        <div class="card-title">価値観スコア</div>
        <div class="value-list">${valueBars}</div>
      </div>

      <div class="result-card">
        <div class="card-title">潜在リスク</div>
        <div class="risk-list">${risksHtml}</div>
      </div>

      <div class="result-card full">
        <div class="card-title">推奨環境</div>
        <div class="env-list">${envsHtml}</div>
      </div>
    </div>

    <div class="result-footer">
      <button class="btn-retry" onclick="startQuiz()">もう一度診断する</button>
    </div>
  `;

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.value-bar').forEach(bar => {
      bar.style.width = bar.dataset.target + '%';
    });
  }, 100);

  // Radar chart
  setTimeout(() => {
    const ctx = document.getElementById('radar-chart').getContext('2d');
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: AXES,
        datasets: [{
          data: AXES.map(a => parseFloat((normalized[a] * 100).toFixed(1))),
          backgroundColor: 'rgba(124,109,250,0.15)',
          borderColor: 'rgba(167,139,250,0.8)',
          borderWidth: 2,
          pointBackgroundColor: AXES.map(a => AXIS_COLORS[a]),
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          pointRadius: 5,
          pointHoverRadius: 7,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            min: 0,
            max: 30,
            ticks: {
              display: false,
              stepSize: 10,
            },
            grid: {
              color: '#1e1e2e',
            },
            angleLines: {
              color: '#1e1e2e',
            },
            pointLabels: {
              color: function(ctx) {
                return AXIS_COLORS[AXES[ctx.index]];
              },
              font: { size: 13, weight: '700' },
            }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.raw}%`
            }
          }
        }
      }
    });
  }, 200);
}

// ===========================
// UTILS
// ===========================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

init();
</script>
</body>
</html>
